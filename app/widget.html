<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./style/style.css" />
    <title>Zoho Desk - Apps</title>
  </head>

  <body>
    <div class="header">
      <div class="header-title-container">
        <span>Información DocenteMás</span>
        <div class="reload-button" id="reload" title="Recargar Info. Ticket">
          <!-- <img src="./img/refresh.svg" alt="Refresh" srcset="" /> -->
          <svg fill="#f0f0f0"  viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M27.1 14.313V5.396L24.158 8.34c-2.33-2.325-5.033-3.503-8.11-3.503C9.902 4.837 4.901 9.847 4.899 16c.001 6.152 5.003 11.158 11.15 11.16 4.276 0 9.369-2.227 10.836-8.478l.028-.122h-3.23l-.022.068c-1.078 3.242-4.138 5.421-7.613 5.421a8 8 0 0 1-5.691-2.359A7.993 7.993 0 0 1 8 16.001c0-4.438 3.611-8.049 8.05-8.049 2.069 0 3.638.58 5.924 2.573l-3.792 3.789H27.1z"/></svg>
        </div>
      </div>
      <div class="tab-options-container">
        <div class="tab-option selected" id="auto-tab">
          <span>Ticket</span>
        </div>
        <div id="manual-tab" class="tab-option">
          <span>Manual</span>
        </div>
      </div>
    </div>
    <div class="load-panel inactive" id="load-panel">
      <div class="lds-dual-ring"></div>
    </div>
    <div class="manual-panel inactive" id="manual-panel">
      <input
        type="text"
        id="manual-rut"
        placeholder="Ingrese RUT (ej: 12345678-K)"
      />
      <button id="manual-search">Buscar</button>
    </div>

    <div class="load-panel inactive" id="load-panel">
      <div class="lds-dual-ring"></div>
    </div>
    <div class="user-info"></div>
    <script src="https://js.zohostatic.com/support/developer_sdk/v1/js/ZohoDeskClientSDK.min.js"></script>
    <script src="./js/extension.js" charset="utf-8"></script>
  </body>
</html>
